<app-header (toggleSidebar)="toggleSidebar()"></app-header>

<div class="dashboard-wrapper" [class.sidebar-hidden]="isSidebarHidden">
  <app-sidenav [isSidebarHidden]="isSidebarHidden"></app-sidenav>

  <main class="main-content">
    <section class="table-wrapper">

      <div class="dashboard-control-bar d-flex flex-wrap justify-content-between align-items-center mb-3" style="gap: 1rem; padding-top: 2em;">
  
        <!-- Search Input (left) -->
        <div class="flex-grow-1 position-relative" style="min-width: 250px; max-width: 400px;">
          <input
            type="text"
            pInputText
            placeholder="Search Job | Item | WC"
            [(ngModel)]="searchTerm"
            (input)="onGlobalSearch($event)"
            class="form-control ps-5 pe-5 rounded-pill shadow-sm"
            style="height: 45px;"
          />

          
        </div>

        <!-- Sync Button (right) -->
        <!-- <div>
          <button type="button" class="btn custom-assign-btn rounded-pill px-4 py-2" (click)="syncJob()" [disabled]="isLoading">
            <i class="fas fa-sync-alt me-2"></i>
            <span *ngIf="!isLoading"> Sync Unposted Job</span>
            <span *ngIf="isLoading"> Syncing... <i class="fas fa-spinner fa-spin ms-1"></i></span>
          </button>
          <div *ngIf="syncMessage" class="mt-2" 
              [ngClass]="{ 'text-success': !isError, 'text-danger': isError }">
            {{ syncMessage }}
          </div>
        </div> -->

      </div>




      <div class="card p-1 mt-3 shadow-sm">
        <div class="card-body p-1">
          <p-table
            #dt
            [value]="operations"
            [paginator]="true"
            [rows]="5000"
            [loading]="isLoading"
            [responsiveLayout]="'scroll'"
            [scrollable]="true"
            scrollHeight="600px"        
            [resizableColumns]="false"  
            [autoLayout]="false"        
            [showCurrentPageReport]="true"
            currentPageReportTemplate="Showing {first}-{last} of {totalRecords}"
            [globalFilterFields]="['job','item','wc','empName']"
          >


            <ng-template pTemplate="header">
              <tr>
                <th style="background-color:#ECC391;">S.No</th>
                <th pSortableColumn="job" style="background-color:#ECC391;">
                  Job <p-sortIcon field="job"></p-sortIcon>
                </th>
                <th pSortableColumn="item" style="background-color:#ECC391;">
                  Item <p-sortIcon field="item"></p-sortIcon>
                </th>
                <th pSortableColumn="wcCode" style="background-color:#ECC391;">
                  WC Code <p-sortIcon field="wcCode"></p-sortIcon>
                </th>
                <th pSortableColumn="empName" style="background-color:#ECC391;">
                  Employee Name <p-sortIcon field="empName"></p-sortIcon>
                </th>
                <th style="background-color:#ECC391;">Last Modified</th>
                <th style="background-color:#ECC391;">Last Modified By</th>
              </tr>
            </ng-template>

            <ng-template pTemplate="body" let-job let-rowIndex="rowIndex">
              <tr>
                <td>{{ job.sno }}</td>

                <td>
                  <a href="javascript:void(0)"
                    (click)="onJobClick(job.job)"
                    class="text-primary text-decoration-underline">
                    {{ job.job }}
                  </a>
                </td>

                <td>{{ job.item }}</td>
                <td>{{ job.wcCode }}</td>

                <!-- Employee Name — will wrap long names like "RAJASHEKHAR CHANNABASAPPA, KUMBAPOOR" -->
                <td style="white-space: normal; word-break: break-word;">
                  {{ job.empName }}
                </td>

                <td>{{ job.lastModifiedDate ? (job.lastModifiedDate | date:'dd/MM/yyyy HH:mm') : '-' }}</td>
                <td style="white-space: normal; word-break: break-word;">
                  {{ job.lastModifiedByName || '-' }}
                </td>
              </tr>
            </ng-template>


          </p-table>
        </div>
      </div>
    </section>
  </main>
</div>
